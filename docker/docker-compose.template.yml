version: '3.8'

services:
  openclaw-agent-${USER_ID}:
    image: openclaw-vibe:latest
    container_name: openclaw-vibe-${USER_ID}
    restart: always
    mem_limit: 512m
    cpus: 0.5
    environment:
      - OPENCLAW_USER_ID=${USER_ID}
      - BRAVE_API_KEY=${BRAVE_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    ports:
      - "${PORT}:3000"
    volumes:
      # 物理隔离的核心：每个用户拥有独立的持久化空间
      - ./data/${USER_ID}/workspace:/root/.openclaw/workspace
      - ./data/${USER_ID}/config:/root/.openclaw/config
    networks:
      - openclaw-net

networks:
  openclaw-net:
    driver: bridge
